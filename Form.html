<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <center>
        <form>
              <h1>Registration Form</h1>
            <table border="4" cellpadding="2" cellspacing="1">
                <tr>
                    <td>Student Name</td>
                    <td><input type="text" placeholder="First Name"></td>
                    <td><input type="text" placeholder="Middle Name"></td>
                    <td><input type="text" placeholder="Last Name"></td>
                </tr>
                <tr>
                     <td>Father's Name</td>
                     <td><input type="text" placeholder="Enter Father's Name"></td>
                     <td>Mother's Name</td>
                     <td><input type="text" placeholder="Enter Mother's Name"></td>
                </tr>
                <tr>
                    <td>Date of Birth</td>
                    <td><input type="date"></td>
                    <td>Gender</td>
                    <td><input type="radio" Name="Gender">Male
                    <input type="radio" Name="Gender">Female</td>
                </tr>
                <tr>
                    <td>Category</td>
                    <td><input type="radio" name="cat">SC/ST
                    <input type="radio" name="cat">OBC
                    <input type="radio" name="cat">General</td>
                    <td>Handicapped</td>
                    <td><input type="radio" name="dog">Yes
                    <input type="radio" name="dog">No</td>
                </tr>
                <tr>
                    <td>Email ID</td>
                    <td><input type="email"></td>
                    <td>Mobile No.</td>
                    <td><input type="tel"></td>
                </tr>
                <tr>
                    <td>State</td>
                    <td><select>
                        <option>Select any One</option>
                        <option>Punjab</option>
                        <option>Himachal Pardesh</option>
                        <option>Haryana</option>
                    </td>
                    <td>City</td>
                    <td>
                        <select>
                            <option>Select any One</option>
                            <option>Jalandhar</option>
                            <option>Manali</option>
                            <option>Pznipat</option>
                    </td>
                </tr>
                <tr>
                    <td>Upload Photo</td>
                    <td><input type="file"></td>
                    <td>Upload Signature</td>
                    <td><input type="file"></td>
                </tr>
                <tr>
                    <td colspan="4" align="center">
                    <input type="submit" value="submit"></td>
                </tr>
            </table>
        </form>
    </center>
</body>
</html>
